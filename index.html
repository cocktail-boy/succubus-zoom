<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Albedo zoom explorer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0b10;
    --hot: rgba(255, 220, 120, 0.0);
    --hot-hover: rgba(255, 220, 120, 0.22);
    --hot-border: rgba(255, 220, 120, 0.85);
    --chip-bg: rgba(15, 15, 25, 0.78);
    --chip-fg: #f6e8c8;
    --chip-border: rgba(255, 220, 120, 0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: #ddd;
    font: 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: grid;
    place-items: center;
    padding: 16px;
  }
  .stage {
    position: relative;
    aspect-ratio: 3 / 4;
    height: min(100%, 95vh);
    width: auto;
    max-width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
  }
  .stage video.below { z-index: 1; }
  .stage video.above { z-index: 2; }
  .hotspots {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 1;
    transition: opacity 180ms ease;
  }
  .hotspots.hidden { opacity: 0; pointer-events: none; }
  .hotspot {
    position: absolute;
    background: var(--hot);
    border: 1.5px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    pointer-events: auto;
    transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    padding: 0;
    color: transparent;
    appearance: none;
  }
  .hotspot:hover, .hotspot:focus-visible {
    background: var(--hot-hover);
    border-color: var(--hot-border);
    box-shadow: 0 0 0 1px rgba(255, 220, 120, 0.18), 0 6px 18px rgba(255, 220, 120, 0.18);
    outline: none;
  }
  .chrome {
    position: absolute;
    z-index: 4;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .chrome.tl { top: 12px; left: 12px; }
  .chrome.br { bottom: 12px; right: 12px; }
  .chip {
    background: var(--chip-bg);
    color: var(--chip-fg);
    border: 1px solid var(--chip-border);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    pointer-events: auto;
    cursor: default;
  }
  button.chip {
    cursor: pointer;
    transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
  }
  button.chip:hover, button.chip:focus-visible {
    background: rgba(255, 220, 120, 0.18);
    color: #fff8e3;
    border-color: rgba(255, 220, 120, 0.8);
    outline: none;
  }
  button.chip[hidden] { display: none; }
  .crumbs {
    pointer-events: none;
    opacity: 0.85;
  }
  .start-veil {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: grid;
    place-items: center;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(2px);
    cursor: pointer;
    transition: opacity 220ms ease;
  }
  .start-veil[hidden] { display: none; }
  .start-veil .label {
    color: var(--chip-fg);
    border: 1px solid var(--chip-border);
    background: var(--chip-bg);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="vidA" class="above" muted playsinline preload="auto"></video>
    <video id="vidB" class="below" muted playsinline preload="auto"></video>
    <div class="hotspots" id="hotspots"></div>
    <div class="chrome tl">
      <span class="chip crumbs" id="crumbs">anchor</span>
    </div>
    <div class="chrome br">
      <button class="chip" id="backBtn" hidden>Back</button>
    </div>
    <div class="start-veil" id="startVeil">
      <span class="label">Tap to start</span>
    </div>
  </div>

<script>
const BASE = "anchor_zoom_hb";

// Node graph derived from ZOOM_STRUCTURE.md
const PARENT = {
  "albedo_anchor_from_codex": null,
  "albedo_zoom_01_face_eyes":     "albedo_anchor_from_codex",
  "albedo_zoom_02_horns_hair":    "albedo_anchor_from_codex",
  "albedo_zoom_03_wings":         "albedo_anchor_from_codex",
  "albedo_zoom_04_gown_jewelry":  "albedo_anchor_from_codex",
  "albedo_zoom_l2_01_eye_iris":           "albedo_zoom_01_face_eyes",
  "albedo_zoom_l2_02_lips_skin":          "albedo_zoom_01_face_eyes",
  "albedo_zoom_l2_03_horn_filigree":      "albedo_zoom_02_horns_hair",
  "albedo_zoom_l2_04_ahoge_hair_sheen":   "albedo_zoom_02_horns_hair",
  "albedo_zoom_l2_05_feather_barbs":      "albedo_zoom_03_wings",
  "albedo_zoom_l2_06_wing_edge_rimlight": "albedo_zoom_03_wings",
  "albedo_zoom_l2_07_sapphire_choker":    "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_08_glove_pauldron":     "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_09_neckline_jewelry":   "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_10_bodice_scrollwork":  "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_11_opera_glove_wrist":  "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_12_waist_filigree_silk":"albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_13_neckline_bodice":    "albedo_zoom_04_gown_jewelry",
  "albedo_zoom_l2_14_navel_waist":        "albedo_zoom_04_gown_jewelry",
};

function levelOf(stem) {
  if (stem === "albedo_anchor_from_codex") return "anchor";
  if (stem.includes("_l2_")) return "l2";
  return "l1";
}

const HOTSPOTS = {
  "albedo_anchor_from_codex": [
    { id: "root-face-eyes",    x: 35, y: 18, w: 31, h: 22, target: "albedo_zoom_01_face_eyes" },
    { id: "root-horns-hair",   x: 22, y:  8, w: 56, h: 18, target: "albedo_zoom_02_horns_hair" },
    { id: "root-wing-left",    x:  0, y:  7, w: 26, h: 48, target: "albedo_zoom_03_wings" },
    { id: "root-wing-right",   x: 72, y:  7, w: 28, h: 49, target: "albedo_zoom_03_wings" },
    { id: "root-gown-jewelry", x: 18, y: 36, w: 64, h: 50, target: "albedo_zoom_04_gown_jewelry" },
  ],
  "albedo_zoom_01_face_eyes": [
    { id: "face-eye-iris",   x: 24, y: 33, w: 43, h: 13, target: "albedo_zoom_l2_01_eye_iris" },
    { id: "face-lips-skin",  x: 37, y: 50, w: 31, h: 18, target: "albedo_zoom_l2_02_lips_skin" },
  ],
  "albedo_zoom_02_horns_hair": [
    { id: "horns-filigree",  x:  5, y: 34, w: 48, h: 25, target: "albedo_zoom_l2_03_horn_filigree" },
    { id: "hair-ahoge",      x: 34, y:  0, w: 30, h: 28, target: "albedo_zoom_l2_04_ahoge_hair_sheen" },
  ],
  "albedo_zoom_03_wings": [
    { id: "wing-feather-barbs", x: 39, y: 5, w: 58, h: 71, target: "albedo_zoom_l2_05_feather_barbs" },
    { id: "wing-edge-rimlight", x: 76, y: 7, w: 22, h: 74, target: "albedo_zoom_l2_06_wing_edge_rimlight" },
  ],
  "albedo_zoom_04_gown_jewelry": [
    { id: "gown-sapphire-choker",   x: 40, y:  7, w: 22, h: 16, target: "albedo_zoom_l2_07_sapphire_choker" },
    { id: "gown-glove-pauldron",    x:  0, y: 22, w: 25, h: 55, target: "albedo_zoom_l2_08_glove_pauldron" },
    { id: "gown-neckline-jewelry",  x: 34, y:  4, w: 35, h: 22, target: "albedo_zoom_l2_09_neckline_jewelry" },
    { id: "gown-bodice-scrollwork", x: 20, y: 30, w: 60, h: 28, target: "albedo_zoom_l2_10_bodice_scrollwork" },
    { id: "gown-opera-glove-wrist", x:  0, y: 62, w: 25, h: 28, target: "albedo_zoom_l2_11_opera_glove_wrist" },
    { id: "gown-waist-filigree-silk", x: 22, y: 62, w: 56, h: 34, target: "albedo_zoom_l2_12_waist_filigree_silk" },
    { id: "gown-neckline-bodice",   x: 28, y: 20, w: 44, h: 30, target: "albedo_zoom_l2_13_neckline_bodice" },
    { id: "gown-navel-waist",       x: 37, y: 61, w: 25, h: 21, target: "albedo_zoom_l2_14_navel_waist" },
  ],
};

const idleUrl = (stem) => `${BASE}/idle/${stem}.mp4`;
const forwardUrl = (childStem) => {
  const lvl = levelOf(childStem);
  return `${BASE}/${lvl}/${childStem}.mp4`;
};
const reverseUrl = (childStem) => {
  const lvl = levelOf(childStem);
  return `${BASE}/${lvl}_reverse/${childStem}.mp4`;
};
const labelOf = (stem) => stem
  .replace(/^albedo_(zoom_)?/, "")
  .replace(/^anchor_from_codex$/, "anchor")
  .replace(/_/g, " ");

// ---- Player ----
const vidA = document.getElementById("vidA");
const vidB = document.getElementById("vidB");
const hotspotsEl = document.getElementById("hotspots");
const backBtn = document.getElementById("backBtn");
const crumbs = document.getElementById("crumbs");

let cur = vidA;
let nxt = vidB;
let stem = "albedo_anchor_from_codex";
let phase = "idle";        // "idle" | "transition"
let queued = null;          // null | { kind: "forward", target } | { kind: "back" }

function setActive(vid) {
  vid.classList.add("above");
  vid.classList.remove("below");
  const other = vid === vidA ? vidB : vidA;
  other.classList.add("below");
  other.classList.remove("above");
}

// Wait until the video has actually painted its current frame to the compositor.
// Without this, swapping z-index can reveal a still-black layer that hasn't
// decoded its first frame yet.
function awaitFirstFrame(vid) {
  if ('requestVideoFrameCallback' in vid) {
    return new Promise((resolve) => vid.requestVideoFrameCallback(() => resolve()));
  }
  return new Promise((resolve) => {
    const done = () => { vid.removeEventListener('playing', done); resolve(); };
    vid.addEventListener('playing', done, { once: true });
  });
}

function showHotspots(forStem) {
  hotspotsEl.innerHTML = "";
  const list = HOTSPOTS[forStem] || [];
  for (const h of list) {
    const b = document.createElement("button");
    b.className = "hotspot";
    b.style.left = h.x + "%";
    b.style.top = h.y + "%";
    b.style.width = h.w + "%";
    b.style.height = h.h + "%";
    b.title = h.id;
    b.addEventListener("click", () => onHotspot(h.target));
    hotspotsEl.appendChild(b);
  }
  hotspotsEl.classList.remove("hidden");
  backBtn.hidden = !PARENT[forStem];
  crumbs.textContent = labelOf(forStem);
}

function hideHotspots() {
  hotspotsEl.classList.add("hidden");
  backBtn.hidden = true;
}

function setSrcIfNew(vid, url) {
  // Avoid reloading if the buffer is already prepped with this URL.
  if (vid.dataset.url !== url) {
    vid.dataset.url = url;
    vid.src = url;
    vid.load();
  }
}

async function loadAndPlay(vid, url, { loop }) {
  vid.loop = !!loop;
  vid.playbackRate = 1.0;
  setSrcIfNew(vid, url);
  vid.currentTime = 0;
  try { await vid.play(); } catch (_) { /* autoplay rejection: muted=true keeps us in spec */ }
}

function preload(vid, url) {
  vid.loop = false;
  setSrcIfNew(vid, url);
}

async function startIdle(forStem) {
  phase = "idle";
  queued = null;
  stem = forStem;
  cur.loop = false;
  cur.playbackRate = 1.0;
  cur.onended = onIdleEnded;
  await loadAndPlay(cur, idleUrl(forStem), { loop: false });
  showHotspots(forStem);
}

async function onIdleEnded() {
  if (phase !== "idle") return;
  if (queued) {
    const q = queued;
    queued = null;
    cur.playbackRate = 1.0;
    if (q.kind === "forward") await playTransitionInto(q.target);
    else if (q.kind === "back") await playTransitionBack();
    return;
  }
  // Replay this iteration of the idle.
  cur.currentTime = 0;
  cur.playbackRate = 1.0;
  try { await cur.play(); } catch (_) {}
}

// Swap from cur (just ended) to nxt (which should already be preloaded with `url`),
// then on transition end run `onDone`. Avoids any black flash by:
//  1. awaiting first painted frame on nxt before flipping z-index,
//  2. keeping both layers fully opaque (no opacity crossfade).
async function playTransition(url, nextIdleStem, onDone) {
  hideHotspots();
  phase = "transition";
  cur.onended = null;
  // If the click handler already preloaded the right URL, this is a no-op.
  setSrcIfNew(nxt, url);
  nxt.loop = false;
  nxt.playbackRate = 1.0;
  nxt.currentTime = 0;
  try { await nxt.play(); } catch (_) {}
  await awaitFirstFrame(nxt);
  setActive(nxt);
  cur.pause();
  [cur, nxt] = [nxt, cur];
  // Preload the next-idle URL into the back buffer while the transition plays
  // so the transition->idle swap is also instant.
  if (nextIdleStem) preload(nxt, idleUrl(nextIdleStem));
  cur.onended = async () => {
    cur.onended = null;
    await onDone();
  };
}

async function playTransitionInto(targetStem) {
  await playTransition(forwardUrl(targetStem), targetStem, async () => {
    await swapToPreloadedIdle(targetStem);
  });
}

async function playTransitionBack() {
  const parent = PARENT[stem];
  if (!parent) return;
  await playTransition(reverseUrl(stem), parent, async () => {
    await swapToPreloadedIdle(parent);
  });
}

// nxt was preloaded with the next idle during the transition; flip to it now.
async function swapToPreloadedIdle(targetStem) {
  setSrcIfNew(nxt, idleUrl(targetStem));
  nxt.loop = false;
  nxt.playbackRate = 1.0;
  nxt.currentTime = 0;
  try { await nxt.play(); } catch (_) {}
  await awaitFirstFrame(nxt);
  setActive(nxt);
  cur.pause();
  [cur, nxt] = [nxt, cur];
  phase = "idle";
  queued = null;
  stem = targetStem;
  cur.onended = onIdleEnded;
  showHotspots(targetStem);
}

function onHotspot(target) {
  if (phase !== "idle") return;
  if (queued) return;
  queued = { kind: "forward", target };
  // Eagerly preload the transition so the swap at idle-end is instant.
  preload(nxt, forwardUrl(target));
  // Rush the idle to its end so the transition starts soon.
  cur.playbackRate = 3.0;
}

function onBack() {
  if (phase !== "idle") return;
  if (queued) return;
  if (!PARENT[stem]) return;
  queued = { kind: "back" };
  preload(nxt, reverseUrl(stem));
  cur.playbackRate = 3.0;
}

backBtn.addEventListener("click", onBack);

// Mobile browsers (iOS Safari in particular) block autoplay outside a user
// gesture even when muted+playsinline. Gate the first play() behind a tap.
const startVeil = document.getElementById("startVeil");
async function start() {
  if (!startVeil.hidden) startVeil.hidden = true;
  // Prime both video elements within the gesture so subsequent play() calls
  // (on swap) are allowed.
  try { vidA.muted = true; vidB.muted = true; await vidA.play(); vidA.pause(); } catch (_) {}
  try { await vidB.play(); vidB.pause(); } catch (_) {}
  await startIdle("albedo_anchor_from_codex");
}
startVeil.addEventListener("click", start, { once: true });
startVeil.addEventListener("touchend", (e) => { e.preventDefault(); start(); }, { once: true, passive: false });
</script>
</body>
</html>
